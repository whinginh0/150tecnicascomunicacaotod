<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área de Membros - 150 Técnicas TOD</title>
  <!-- Google Fonts Outfit para fonte arredondada, moderna e amigável -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --branco: #FFFFFF;
      --off-white: #F0F7FF; /* Fundo azul bebê suave ~10% de opacidade */
      --preto: #2D2D2D;
      --grafite: #555273;
      
      --azul-claro: #E0EFFF;
      --azul-principal: #49A0E8; /* Azul bebê principal */
      --azul-escuro: #2D8CD5;
      
      --verde-claro: #E2FFF0;
      --verde-texto: #27AE60;
      
      --sombra-premium: 0 10px 28px rgba(30, 20, 50, 0.15), 0 3px 6px rgba(30, 20, 50, 0.08);
      --sombra-hover: 0 18px 42px rgba(30, 20, 50, 0.22), 0 5px 12px rgba(30, 20, 50, 0.12);
      
      --radius-md: 18px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--off-white);
      color: var(--grafite);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* CONTAINER PRINCIPAL (ESTILO CARD CLEAN DA PG VENDAS) */
    .app-container {
      width: 100%;
      max-width: 420px;
      background-color: var(--branco);
      border-radius: var(--radius-lg);
      border: 1.5px solid #D5D5E6;
      box-shadow: var(--sombra-premium);
      padding: 36px 24px 28px 24px;
      margin: 20px auto;
      position: relative;
      overflow: hidden;
    }

    /* Linha decorativa no topo para dar estilo igual ao card de 'O que você vai receber' */
    .app-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4.5px;
      background: linear-gradient(90deg, var(--azul-principal), #82C4FF);
    }

    /* TELA DE LOGIN */
    .view-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-area {
      width: 64px;
      height: 64px;
      background-color: var(--azul-claro);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--preto);
      margin-bottom: 10px;
      line-height: 1.3;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13.5px;
      color: #8A87A8;
      margin-bottom: 32px;
      font-weight: 500;
      line-height: 1.45;
    }

    .input-group {
      width: 100%;
      text-align: left;
      margin-bottom: 24px;
    }

    label {
      font-weight: 700;
      font-size: 12.5px;
      color: var(--preto);
      display: block;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      padding: 13px 18px;
      border-radius: 50px;
      border: 1.5px solid #D5D5E6;
      font-size: 14.5px;
      font-weight: 600;
      color: var(--preto);
      outline: none;
      background-color: #FAF9FE;
      transition: all 0.2s;
    }

    input[type="email"]:focus {
      border-color: var(--azul-principal);
      background-color: var(--branco);
      box-shadow: 0 0 0 3px rgba(73, 160, 232, 0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 14px 24px;
      background-color: var(--azul-principal);
      color: var(--branco);
      border: none;
      border-radius: 50px;
      font-size: 14.5px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(73, 160, 232, 0.25);
    }

    .btn-submit:hover {
      background-color: var(--azul-escuro);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(73, 160, 232, 0.35);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .alert-error {
      background-color: #FFF2F2;
      color: #E53E3E;
      border: 1.5px solid #FED7D7;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      width: 100%;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    /* TELA DE DASHBOARD */
    .view-dashboard {
      display: none;
    }

    .header-dashboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      border-bottom: 1.5px solid #F0F0F5;
      padding-bottom: 18px;
    }

    .user-info {
      text-align: left;
    }

    .user-info h2 {
      font-size: 18px;
      font-weight: 900;
      color: var(--preto);
      letter-spacing: -0.3px;
    }

    .user-info p {
      font-size: 12px;
      color: #8A87A8;
      font-weight: 600;
    }

    .btn-logout {
      background: none;
      border: 1.5px solid #E2E2EC;
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--grafite);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background-color: #FAF9FE;
      border-color: #D5D5E6;
    }

    /* BARRA DE PROGRESSO */
    .progress-section {
      background-color: #FAF9FE;
      border: 1.5px solid #E2E2EC;
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 28px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-title {
      font-size: 11.5px;
      font-weight: 800;
      color: #8A87A8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-percent {
      font-size: 13.5px;
      font-weight: 800;
      color: var(--azul-escuro);
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background-color: #EBEBF3;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background-color: var(--verde-texto);
      width: 0%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* LISTA DE ENTREGÁVEIS */
    .deliverables-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .deliverable-card {
      border: 1.5px solid #D5D5E6;
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 24px rgba(30, 20, 50, 0.06);
      background-color: var(--branco);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .deliverable-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3.5px;
      background-color: var(--card-theme, var(--azul-principal));
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }

    .deliverable-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--sombra-hover);
    }

    .deliverable-card.completed {
      border-color: #C2F0D5;
      box-shadow: 0 8px 24px rgba(39, 174, 96, 0.08);
    }

    .deliverable-top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .deliverable-img {
      width: 64px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #E2E2EC;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    .deliverable-info {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
    }

    .deliverable-tag {
      font-size: 9.5px;
      font-weight: 800;
      background-color: #FAF9FE;
      color: #8A87A8;
      padding: 2px 8px;
      border-radius: 50px;
      align-self: flex-start;
      border: 1px solid #E2E2EC;
    }

    .deliverable-info h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--preto);
      line-height: 1.35;
    }

    .deliverable-info p {
      font-size: 11px;
      color: #8A87A8;
      line-height: 1.45;
      font-weight: 500;
    }

    .deliverable-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1.5px solid #F0F0F5;
      padding-top: 12px;
      gap: 12px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background-color: var(--azul-principal);
      border: none;
      border-radius: 50px;
      font-size: 11.5px;
      font-weight: 800;
      color: var(--branco);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 3px 8px rgba(73, 160, 232, 0.2);
    }

    .btn-download:hover {
      background-color: var(--azul-escuro);
      transform: translateY(-1px);
    }

    /* CHECKBOX CUSTOMIZADO ESTILO CLEAN */
    .checkbox-container {
      display: flex;
      align-items: center;
      user-select: none;
      cursor: pointer;
    }

    .checkbox-input {
      display: none;
    }

    .checkbox-box {
      width: 20px;
      height: 20px;
      border: 1.5px solid #D5D5E6;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FAF9FE;
      transition: all 0.2s;
    }

    .checkbox-box::after {
      content: '✓';
      font-size: 11px;
      font-weight: 900;
      color: var(--branco);
      display: none;
    }

    .checkbox-input:checked + .checkbox-box {
      background-color: var(--verde-texto);
      border-color: var(--verde-texto);
    }

    .checkbox-input:checked + .checkbox-box::after {
      display: block;
    }

    .checkbox-label {
      font-size: 11px;
      font-weight: 700;
      color: #8A87A8;
      margin-left: 8px;
    }

    .checkbox-input:checked ~ .checkbox-label {
      color: var(--verde-texto);
      font-weight: 800;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- TELA DE LOGIN (EMAIL) -->
    <div class="view-login" id="view-login">
      <div class="logo-area">📖</div>
      <h1>Área de Membros</h1>
      <p class="subtitle">Insira o e-mail cadastrado na compra para ter acesso aos seus materiais e bônus.</p>
      
      <div class="alert-error" id="error-alert">Por favor, insira um e-mail válido.</div>
      
      <div class="input-group">
        <label for="user-email">E-mail de Compra</label>
        <input type="email" id="user-email" placeholder="seu-email@exemplo.com" required>
      </div>
      
      <button class="btn-submit" id="btn-login">Entrar</button>
    </div>

    <!-- TELA DE DASHBOARD -->
    <div class="view-dashboard" id="view-dashboard">
      <div class="header-dashboard">
        <div class="user-info">
          <h2>Seus Livros</h2>
          <p id="display-email">email@exemplo.com</p>
        </div>
        <button class="btn-logout" id="btn-logout">Sair</button>
      </div>

      <!-- BARRA DE PROGRESSO -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-title">Seu progresso</span>
          <span class="progress-percent" id="progress-text">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
      </div>

      <!-- LISTA DE ENTREGÁVEIS -->
      <div class="deliverables-list" id="deliverables-container">
        <!-- Inseridos dinamicamente por JS -->
      </div>
    </div>

  </div>

  <script>
    // Configurações e dados dos materiais
    const materials = [
      {
        id: 1,
        title: "150 Técnicas de Comunicação para Crianças e Jovens com TOD",
        description: "Guia principal completo com todas as 150 técnicas práticas organizadas e ilustradas.",
        tag: "Material Principal",
        theme: "#49A0E8", // Azul
        cover: "https://i.ibb.co/XZfVz2zB/produto-principal-pagina-01.jpg",
        fileUrl: "entregavel - 150 tecnicas/150_tecnicas_comunicacao_TOD_COMPLETO_A4_MARGEM_AJUSTADA.pdf"
      },
      {
        id: 2,
        title: "Bônus 1: Kit de Atividades para Momentos de Crise",
        description: "Atividades práticas para acalmar conflitos e guiar momentos de pico de irritabilidade.",
        tag: "Bônus 1",
        theme: "#E85D75", // Coral
        cover: "https://i.ibb.co/mChvQ8tf/bonus1.png",
        fileUrl: "entregavel - 150 tecnicas/BONUS1_Kit_de_Atividades_para_Momoments_de_Crise.pdf"
      },
      {
        id: 3,
        title: "Bônus 2: Caderno de Combinados da Escola e de Casa",
        description: "Modelo visual e pronto para imprimir com regras claras e combinados de convivência.",
        tag: "Bônus 2",
        theme: "#F5A623", // Laranja
        cover: "https://i.ibb.co/Sw0cBr6r/bonus2.png",
        fileUrl: "entregavel - 150 tecnicas/bonus_2_caderno_de_combinados_escola_e_casa.pdf"
      },
      {
        id: 4,
        title: "Bônus 3: Cartões de Expressão Emocional",
        description: "Ilustrações didáticas em cartões para a criança indicar o que está sentindo.",
        tag: "Bônus 3",
        theme: "#2D9CDB", // Azul Médio
        cover: "https://i.ibb.co/d0bCS6VG/bonus3.png",
        fileUrl: "entregavel - 150 tecnicas/BONUS3_Cartoes_de_Expressao_Emocional.pdf"
      },
      {
        id: 5,
        title: "Bônus 4: Manual de Interação com Outras Crianças",
        description: "Estratégias de cooperação social para convivência saudável e comunicação coletiva.",
        tag: "Bônus 4",
        theme: "#9B51E0", // Roxo
        cover: "https://i.ibb.co/TBSPRkms/bonus4.png",
        fileUrl: "entregavel - 150 tecnicas/BONUS4_Manual_de_Interacao_com_Outras_Criancas.pdf"
      }
    ];

    // Elementos DOM
    const viewLogin = document.getElementById('view-login');
    const viewDashboard = document.getElementById('view-dashboard');
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    const inputEmail = document.getElementById('user-email');
    const errorAlert = document.getElementById('error-alert');
    const displayEmail = document.getElementById('display-email');
    const deliverablesContainer = document.getElementById('deliverables-container');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');

    // Chaves de localStorage
    const STORAGE_EMAIL_KEY = 'member_login_email';
    const STORAGE_PROGRESS_KEY_PREFIX = 'progress_member_';

    // Roteamento baseado em Hash
    function checkRoute() {
      const hash = window.location.hash;
      const loggedEmail = localStorage.getItem(STORAGE_EMAIL_KEY);
      
      if (hash === '#/dashboard' && loggedEmail) {
        showDashboard(loggedEmail);
      } else {
        showLogin();
      }
    }

    // Navegar
    function navigateTo(hash) {
      window.location.hash = hash;
    }

    // Mostrar tela de login
    function showLogin() {
      viewDashboard.style.display = 'none';
      viewLogin.style.display = 'flex';
      errorAlert.style.display = 'none';
      window.location.hash = '#/login';
    }

    // Mostrar dashboard
    function showDashboard(email) {
      displayEmail.textContent = email;
      viewLogin.style.display = 'none';
      viewDashboard.style.display = 'block';
      renderDeliverables(email);
      updateProgress(email);
    }

    // Efetuar Login
    btnLogin.addEventListener('click', () => {
      const email = inputEmail.value.trim();
      if (validateEmail(email)) {
        localStorage.setItem(STORAGE_EMAIL_KEY, email);
        navigateTo('#/dashboard');
      } else {
        errorAlert.style.display = 'block';
      }
    });

    // Permitir login ao apertar Enter
    inputEmail.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        btnLogin.click();
      }
    });

    // Logout
    btnLogout.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_EMAIL_KEY);
      navigateTo('#/login');
    });

    // Validar e-mail de compra
    function validateEmail(email) {
      if (!email) return false;
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    // Renderizar lista de materiais
    function renderDeliverables(email) {
      deliverablesContainer.innerHTML = '';
      
      materials.forEach(material => {
        const isCompleted = getCompletionState(email, material.id);
        
        const card = document.createElement('div');
        card.className = `deliverable-card ${isCompleted ? 'completed' : ''}`;
        card.id = `card-${material.id}`;
        card.style.setProperty('--card-theme', material.theme);
        
        card.innerHTML = `
          <div class="deliverable-top">
            <img class="deliverable-img" src="${material.cover}" alt="Capa">
            <div class="deliverable-info">
              <span class="deliverable-tag" style="color: ${material.theme}; background-color: ${material.theme}10; border-color: ${material.theme}25">${material.tag}</span>
              <h3>${material.title}</h3>
              <p>${material.description}</p>
            </div>
          </div>
          <div class="deliverable-bottom">
            <label class="checkbox-container">
              <input type="checkbox" class="checkbox-input" data-id="${material.id}" ${isCompleted ? 'checked' : ''}>
              <span class="checkbox-box"></span>
              <span class="checkbox-label">${isCompleted ? 'Concluído' : 'Concluir'}</span>
            </label>
            <a href="${material.fileUrl}" class="btn-download" style="background-color: ${material.theme}; box-shadow: 0 4px 10px ${material.theme}25" target="_blank" download>
              <span>Baixar PDF</span>
            </a>
          </div>
        `;
        
        // Listener para o checkbox de progresso
        const checkbox = card.querySelector('.checkbox-input');
        checkbox.addEventListener('change', (e) => {
          setCompletionState(email, material.id, e.target.checked);
          
          if (e.target.checked) {
            card.classList.add('completed');
            card.querySelector('.checkbox-label').textContent = 'Concluído';
          } else {
            card.classList.remove('completed');
            card.querySelector('.checkbox-label').textContent = 'Concluir';
          }
          
          updateProgress(email);
        });
        
        deliverablesContainer.appendChild(card);
      });
    }

    // Obter estado de conclusão no localStorage
    function getCompletionState(email, materialId) {
      const key = STORAGE_PROGRESS_KEY_PREFIX + email;
      const completedList = JSON.parse(localStorage.getItem(key)) || [];
      return completedList.includes(materialId);
    }

    // Salvar estado de conclusão no localStorage
    function setCompletionState(email, materialId, state) {
      const key = STORAGE_PROGRESS_KEY_PREFIX + email;
      let completedList = JSON.parse(localStorage.getItem(key)) || [];
      
      if (state) {
        if (!completedList.includes(materialId)) {
          completedList.push(materialId);
        }
      } else {
        completedList = completedList.filter(id => id !== materialId);
      }
      
      localStorage.setItem(key, JSON.stringify(completedList));
    }

    // Atualizar a barra de progresso
    function updateProgress(email) {
      const key = STORAGE_PROGRESS_KEY_PREFIX + email;
      const completedList = JSON.parse(localStorage.getItem(key)) || [];
      const percentage = Math.round((completedList.length / materials.length) * 100);
      
      progressBar.style.width = `${percentage}%`;
      progressText.textContent = `${percentage}%`;
    }

    // Observar mudanças de hash
    window.addEventListener('hashchange', checkRoute);
    
    // Inicializar na carga da página
    checkRoute();
  </script>
</body>
</html>
